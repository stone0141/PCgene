<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCgene - 初心者向けPC構成診断</title>
    <meta name="description" content="予算と用途を選ぶだけで、初心者向けに失敗しにくいPC構成を提案するPCgeneの試作版。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="container">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">PCgene / Preview</p>
          <h1>PC初心者でも、<br />迷わず構成を選べる。</h1>
          <p class="lead">
            用途・予算・重視ポイントを選ぶだけで、おすすめ構成と理由をわかりやすく提案します。
            将来的には価格比較・購入リンク・広告導線までまとめる予定です。
          </p>
          <div class="hero-points">
            <span>初心者向け</span>
            <span>予算別提案</span>
            <span>用途別診断</span>
            <span>収益化導線を想定</span>
          </div>
        </div>
      </section>

      <section class="grid">
        <form id="pc-form" class="card form-panel">
          <h2>構成を診断する</h2>

          <label>
            <span>予算</span>
            <select name="budget" required>
              <option value="100000">10万円前後</option>
              <option value="150000" selected>15万円前後</option>
              <option value="200000">20万円前後</option>
              <option value="300000">30万円前後</option>
            </select>
          </label>

          <label>
            <span>用途</span>
            <select name="usage" required>
              <option value="gaming" selected>ゲーム</option>
              <option value="editing">動画編集</option>
              <option value="streaming">配信</option>
              <option value="ai">AI / 開発</option>
              <option value="daily">普段使い</option>
            </select>
          </label>

          <label>
            <span>重視すること</span>
            <select name="priority" required>
              <option value="value" selected>コスパ</option>
              <option value="performance">性能</option>
              <option value="silent">静音</option>
              <option value="future">将来性</option>
            </select>
          </label>

          <button type="submit">おすすめ構成を見る</button>

          <div class="mini-info">
            <p><strong>このプレビューで見られるもの</strong></p>
            <ul>
              <li>用途別のおすすめ構成</li>
              <li>初心者向けの選定理由</li>
              <li>今後の購入導線の置き場</li>
            </ul>
          </div>
        </form>

        <section id="result" class="card result-panel"></section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
