<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大将 Web Server</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        max-width: 720px;
        padding: 32px;
        text-align: center;
      }
      h1 { font-size: 3rem; margin-bottom: 0.5rem; }
      p { font-size: 1.1rem; line-height: 1.7; }
      code {
        background: #1e293b;
        padding: 0.2rem 0.45rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>大将、配置完了</h1>
      <p>このサーバーは Docker 上の Nginx で動く想定です。</p>
      <p>起動コマンド: <code>docker compose up -d --build</code></p>
    </main>
  </body>
</html>
